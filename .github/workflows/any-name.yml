name: Second Workflow

on: push

jobs:
  first_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Read and list files
        run: |
          echo "Hi there papi"
          cat README.md

      - name: Install Cowsay
        run: |
          sudo apt-get install cowsay -y
          sudo apt-get install cowsay-off -y

      - name: Check available cows
        run: ls /usr/share/cowsay/cows/

      - name: Execute Cowsay CMD
        run: cowsay -f dragon "run for cover smog is smoggin ....RAWR" >> dragon.txt

      - name: Show dragon file
        run: cat dragon.txt

      - name: Check file exists
        run: grep -i "RAWR" dragon.txt

      - name: List repo files
        run: ls -ltr