name: Generate ASCII Workflow

on: push

concurrency:
  group: ${{github.workflow}}-{{github.ref}}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_job:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Cowsay & Generate Dragon file
        run: |
          sudo apt-get install cowsay -y
          sudo apt-get install cowsay-off -y
          cowsay -f dragon "run for cover smog is smoggin ....RAWR" >> dragon.txt

      - name: Upload Dragon artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragon-text-file
          path: dragon.txt

  test_job:
    runs-on: ubuntu-latest
    needs: build_job
    steps:
      - name: Download Dragon artifact
        uses: actions/download-artifact@v4
        with:
          name: dragon-text-file

      - name: Test file exists and contains RAWR
        run: grep -i "RAWR" dragon.txt

  deploy_job:
    runs-on: ubuntu-latest
    needs: test_job
    steps:
      - name: Download Dragon artifact
        uses: actions/download-artifact@v4
        with:
          name: dragon-text-file

      - name: Deploy - Print final output
        run: |
          echo "Deploying dragon file..."
          cat dragon.txt