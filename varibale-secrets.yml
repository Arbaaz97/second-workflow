name: Exploring Variables and Secrets

on: push

CONTAINER_REGISTERY: docker.io
IMAGE_NAME: github-actions-nginx



jobs:

  docker-job:
    runs-on: ubuntu-latest
    steps:
      - name: Docker Build
        run: docker build -t ${{env.CONTAINER_REGISTERY}}/${{vars.DOCKER_USERNAME}}/{{ENV.IMAGE_NAME}}

      - name: Docker Login
        run: docker login --username=${{vars.DOCKER_USERNAME}} --password={{secrets.DOCKER_PASSWORD}}
      
      - name: Docker Publish
        run: docker push ${{ env.CONTAINER_REGISTRY }}/${{ vars.DOCKER_USERNAME }}/$IMAGE_NAME:latest

  
  deploy:
    runs-on: ubuntu-latest
    needs: docker
    steps:

      - name: checkout repo
        uses: action/checkout@v4
      
      - name: deploy
        run: echo "Deploying $IMAGE_NAME to production..."
